{% extends "base.html" %}
{% set title = _("contact") %}
{% block content %}

<div class="container py-4" style="max-width: 760px;">
  <h1 class="h4 mb-3">{{ _("contact_report") }}</h1>

  <div class="card shadow-sm">
    <div class="card-body">

      <p class="text-muted">
        {{ _("contat_info_use") }}
      </p>

      <form method="post" class="row g-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="file_url" value="{{ prefill_file_url }}">

        <div class="col-12">
          <label class="form-label">{{ _("contact_type_message") }}</label>
          <select name="type" class="form-select">
            <option value="contact" {% if prefill_type == "contact" %}selected{% endif %}>{{ _("contact") }}</option>
            <option value="report" {% if prefill_type == "report" %}selected{% endif %}>{{ _("contact_report") }}</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">{{ _("name_optional") }}</label>
          <input type="text" name="name" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label">{{ _("email_optional") }}</label>
          <input type="email" name="email" class="form-control">
        </div>

        {% if prefill_file_url %}
        <div class="col-12">
          <label class="form-label">URL concernée</label>
          <input type="text" class="form-control" value="{{ prefill_file_url }}" readonly>
        </div>
        {% endif %}

        <div class="col-12">
          <label class="form-label">Sujet</label>
          <input
            type="text"
            name="subject"
            class="form-control"
            value="{{ prefill_subject }}"
            required>
        </div>

        <div class="col-12">
          <label class="form-label">{{ _("message") }}</label>
          <textarea
            name="message"
            class="form-control"
            rows="6"
            placeholder="{{ _("message_description") }}"
            required></textarea>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            {{ _("send") }}
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

{% endblock %}
