{% extends "base.html" %}
{% set title = "Admin - Paramètres" %}

{% block head %}
<meta name="robots" content="noindex, nofollow, noarchive">
{% endblock %}

{% block content %}
<div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
  <div>
    <h1 class="h4 mb-0">Paramètres</h1>
    <div class="text-muted small">Réglages minimum du site.</div>
  </div>
  <div class="d-flex gap-2">
    <a class="btn btn-outline-dark btn-sm" href="{{ url_for('admin.admin_panel') }}">Retour admin</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('public.index') }}">Voir page publique</a>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="col-12 col-md-6">
        <label class="form-label fw-semibold">Taille maximale des fichiers (Mo)</label>
        <input
          type="number"
          name="max_upload_size_mb"
          class="form-control"
          min="1"
          max="500"
          step="1"
          value="{{ settings.max_upload_size_mb }}"
          required>
        <div class="form-text">Valeur autorisée : de 1 à 500 Mo.</div>
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label fw-semibold">Fichiers permanents</label>
        <select name="allow_permanent_files" class="form-select">
          <option value="1" {% if settings.allow_permanent_files %}selected{% endif %}>Autorisés</option>
          <option value="0" {% if not settings.allow_permanent_files %}selected{% endif %}>Désactivés</option>
        </select>
        <div class="form-text">Autorise ou masque l'option “sans expiration”.</div>
      </div>

      <div class="col-12">
        <button class="btn btn-primary" type="submit">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
